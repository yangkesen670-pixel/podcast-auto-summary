name: Podcast Auto Summary

on:
  schedule:
    # 針對股癌發布時間進行密集打擊 (UTC 時間，台灣時間早上 08:30 與 09:00)
    - cron: '30 0 * * *'
    - cron: '0 1 * * *'
    # 預留一個晚間排程防漏 (台灣時間晚上 20:00)
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '強制處理最新一集'
        type: boolean
        default: false
      test_notify:
        description: '只測試通知功能'
        type: boolean
        default: false

# 限制併發，避免多個 Runner 同時修改檔案產生 Git 衝突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  podcast-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write  # 必須開啟 Repository 的寫入權限才能 Auto-Commit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Auto-Commit 需要完整的 Git 歷史紀錄

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r podcast-auto-summary/requirements.txt

      - name: Run Podcast Monitor
        env:
          PODCAST_RSS_URL: ${{ secrets.PODCAST_RSS_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          cd podcast-auto-summary
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          if [ "${{ github.event.inputs.test_notify }}" = "true" ]; then
            ARGS="$ARGS --test-notify" # 修正變數覆蓋漏洞
          fi
          python podcast_monitor.py $ARGS

      - name: Commit processed episodes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update processed_episodes.json [skip ci]"
          file_pattern: podcast-auto-summary/processed_episodes.json
