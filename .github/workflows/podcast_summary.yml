name: Podcast Auto Summary

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '強制處理最新一集'
        type: boolean
        default: false
      test_notify:
        description: '只測試通知功能'
        type: boolean
        default: false

jobs:
  podcast-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r podcast-auto-summary/requirements.txt

      - name: Restore processed episodes
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: processed_episodes.json
          key: processed-episodes

      - name: Run Podcast Monitor
        env:
          PODCAST_RSS_URL: ${{ secrets.PODCAST_RSS_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          cd podcast-auto-summary
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          if [ "${{ github.event.inputs.test_notify }}" = "true" ]; then
            ARGS="--test-notify"
          fi
          python podcast_monitor.py $ARGS

      - name: Save processed episodes
        if: always()
        uses: actions/cache/save@v4
        with:
          path: processed_episodes.json
          key: processed-episodes-${{ github.run_id }}
